name: Build Keypad Companion

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Standalone EXE
      run: |
        pyinstaller --clean --onefile --add-binary "hidapi64.dll;." --name Keypad_Companion profile_daemon.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Keypad_Companion
        path: dist/Keypad_Companion.exe
