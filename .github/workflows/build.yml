name: Build Keypad Companion

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Get Version from code
      id: get_version
      shell: bash
      run: |
        VERSION=$(python -c "import re; content=open('profile_daemon.py', encoding='utf-8').read(); m=re.search(r'VERSION\s*=\s*[\"\']([^\"\']+)[\"\']', content); print(m.group(1))")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Found version: $VERSION"

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Standalone EXE
      run: |
        pyinstaller --clean --onefile --add-binary "hidapi64.dll;." --name Keypad_Companion profile_daemon.py

    - name: Create Git Tag and Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        files: dist/Keypad_Companion.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
